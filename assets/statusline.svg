<svg xmlns="http://www.w3.org/2000/svg" width="460" height="180" viewBox="0 0 460 180" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="14">
  <title>Status line example: green, yellow, and red threshold states</title>
  <style>
    text { fill: #8b949e; }
    .g { fill: #22c55e; }
    .y { fill: #eab308; }
    .r { fill: #ef4444; }
  </style>

  <rect width="100%" height="100%" fill="#0d1117"/>

  <text x="12" y="22">Opus 4.7</text>
  <text x="12" y="42">5h: <tspan class="g">23%</tspan> (⟳ 2h) · 7d: <tspan class="g">41%</tspan> (⟳ 3d) · context: <tspan class="g">47k</tspan></text>

  <text x="12" y="82">Opus 4.7 · personal</text>
  <text x="12" y="102">5h: <tspan class="y">78%</tspan> (⟳ 45m) · 7d: <tspan class="y">82%</tspan> (⟳ 2d) · context: <tspan class="y">114k</tspan></text>

  <text x="12" y="142">Opus 4.7</text>
  <text x="12" y="162">5h: <tspan class="r">94%</tspan> (⟳ 12m) · 7d: <tspan class="r">96%</tspan> (⟳ 1d) · context: <tspan class="r">180k</tspan></text>
</svg>
